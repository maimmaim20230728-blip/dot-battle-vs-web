<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<!-- プライバシー保護：外部オリジンへの通信を全面ブロック（ローカル/端末内のみ許可）。
     'self' はブラウザでは同一オリジン、Capacitor WebViewでは https://localhost（=端末内）を指し、外部送信は不可。 -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; base-uri 'none'">
<link rel="icon" href="data:,">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#070a12">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>ドットバトルVS / DOT BATTLE VS</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;padding:0;background:#04060a;color:#e6eefc;font-family:"Courier New",monospace;
    -webkit-text-size-adjust:100%;overscroll-behavior:none;}
  body{display:flex;align-items:center;justify-content:center;}
  /* 縦は画面いっぱい(上下の黒帯=レターボックスを解消)。横は広い画面では9:16幅にキャップ。
     縦長スマホでは画面を縦に使い切り、PC等では9:16の枠として中央表示になる。 */
  #frame{position:relative;width:min(100vw,56.25vh);height:100vh;overflow:hidden;
    background:#070a12;box-shadow:0 0 16px rgba(0,0,0,.55);}
  #app{position:absolute;top:0;left:0;right:0;bottom:54px;overflow-y:auto;overflow-x:hidden;
    padding:6px 10px 10px;-webkit-overflow-scrolling:touch;}
  h1,h2,h3{margin:0;letter-spacing:1px;}
  .pixel{image-rendering:pixelated;image-rendering:crisp-edges;}
  .screen{display:none;} .screen.active{display:block;}

  button{font-family:inherit;font-weight:bold;color:#e6eefc;background:#1b2740;border:3px solid #38507e;
    border-radius:8px;padding:13px 12px;font-size:16px;cursor:pointer;width:100%;box-shadow:0 3px 0 #0d1830;transition:transform .05s;}
  button:active{transform:translateY(2px);box-shadow:0 1px 0 #0d1830;}
  button:disabled{opacity:.45;box-shadow:none;cursor:default;}
  .primary{background:#1f6feb;border-color:#5aa0ff;} .accent{background:#2a8a5a;border-color:#46d369;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  /* 固定ボトムバー（全画面：設定＋言語トグル）。上部は邪魔なので下部へ。HUD(HPゲージ)は上のまま */
  #topbar{position:absolute;bottom:0;left:0;right:0;height:54px;z-index:60;display:flex;align-items:center;
    justify-content:space-between;padding:5px 10px;background:rgba(7,10,18,.94);border-top:1px solid #1c2942;}
  #gearbtn{width:auto;padding:7px 15px;font-size:23px;line-height:1;background:#13203a;border:2px solid #3a567f;box-shadow:none;border-radius:9px;}
  .langbtn{width:auto;padding:9px 15px;font-size:15px;font-weight:bold;background:#13203a;border:2px solid #3a567f;box-shadow:none;border-radius:9px;color:#e6eefc;}
  #setlangbtn{width:auto;padding:7px 14px;font-size:14px;background:#13203a;border:2px solid #3a567f;box-shadow:none;}

  /* タイトル（下が余らないよう縦中央寄せでバランス） */
  #screen-title{text-align:center;}
  #screen-title.active{display:flex;flex-direction:column;justify-content:center;min-height:100%;padding:6px 0;}
  .logo{padding:8px 0 4px;}
  .logo-main,.logo-vs{font-weight:900;line-height:1;display:inline-block;}
  .logo-main{font-size:34px;color:#ffd24a;letter-spacing:1px;-webkit-text-stroke:2px #3a2600;
    text-shadow:1px 1px 0 #a8741a,2px 2px 0 #8a5e12,3px 3px 0 #6e4a0e,4px 5px 9px rgba(0,0,0,.55);}
  .logo-vs{font-size:42px;font-style:italic;color:#ff6a3c;margin-left:4px;vertical-align:-3px;-webkit-text-stroke:2px #3a0c00;
    text-shadow:1px 1px 0 #b03a18,2px 2px 0 #8a2810,3px 3px 0 #6e1e0c,4px 5px 9px rgba(0,0,0,.55);
    animation:vspulse 1.2s ease-in-out infinite;}
  @keyframes vspulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
  .logo small{display:block;font-size:12px;color:#8fe0ff;margin-top:11px;letter-spacing:5px;font-weight:bold;
    text-shadow:0 0 9px rgba(120,200,255,.75);animation:subblink 2.2s ease-in-out infinite;}
  @keyframes subblink{0%,100%{opacity:.5}50%{opacity:1}}
  .badges{margin:12px 0;}
  .badges span{display:inline-block;font-size:10px;background:#13203a;border:1px solid #2c416e;border-radius:999px;padding:4px 9px;margin:3px;color:#9fc0ea;}
  #subtitle{font-size:11.5px;color:#9bb0d0;line-height:1.6;margin:8px 6px 14px;}
  .modes{display:grid;gap:11px;}
  .bigbtn{text-align:left;padding:12px 14px;}
  .bigbtn .mtitle{display:block;font-size:16px;}
  .bigbtn .mdesc{display:block;font-size:11px;color:#9ab;margin-top:3px;font-weight:normal;}
  #mode-solo{background:#3a2a6e;border-color:#7a5cff;} #mode-hotseat{background:#1f5a4a;border-color:#46d3a0;}
  #mode-qr{background:#5a2a4a;border-color:#ff5aa0;} #mode-mychar{background:#2a3a6e;border-color:#5a8aff;}
  .diff-infinity{background:linear-gradient(90deg,#3a1a4a,#5a2a3a);border-color:#ffd24a;box-shadow:0 0 12px rgba(255,210,74,.35);}
  #battlemaster{margin:2px auto 10px;font-size:13px;font-weight:bold;color:#ffd24a;text-shadow:1px 1px 0 #000;letter-spacing:.5px;}
  #screen-mychar{padding-top:6px;}
  .pickcard{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#0d1424;border:2px solid #38507e;border-radius:10px;padding:8px 10px;margin-bottom:8px;}
  .pickcard .pickinfo{display:flex;flex-direction:column;min-width:0;}
  .pickcard .pickinfo b{font-size:15px;color:#e2ecfb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pickcard .pickinfo small{font-size:12px;color:#9ab;}
  .pick-empty{color:#9ab;font-size:13px;line-height:1.7;margin:24px 10px;text-align:center;}
  #soyogilink{display:block;margin-top:16px;font-size:12px;color:#9be0c0;text-decoration:none;
    border:1px dashed #2c6e54;border-radius:8px;padding:10px;}
  #soyogilink:active{background:#0f1f18;}

  /* 難易度 */
  #screen-difficulty{padding-top:6px;}
  #diff-title{text-align:center;font-size:20px;margin:6px 0 14px;}
  .bigbtn.diff-easy{border-color:#46d369;} .bigbtn.diff-normal{border-color:#5aa0ff;}
  .bigbtn.diff-hard{border-color:#ffa53c;} .bigbtn.diff-veryhard{border-color:#ff5a6a;}
  .bigbtn.diff-ultimate{border-color:#c07bff;background:#3a2a5e;}
  .solo-badges{display:block;margin-top:6px;color:#ffd24a;font-size:16px;letter-spacing:4px;}
  .backbtn{margin-top:12px;background:#11192c;border-color:#2c416e;}

  /* セットアップ */
  #setuptitle{text-align:center;font-size:22px;margin:3px 0 8px;}
  .panel{background:#0d1424;border:2px solid #243a63;border-radius:10px;padding:10px;margin-bottom:8px;}
  #previewwrap{text-align:center;padding:14px;background:#05070d;border-radius:8px;position:relative;}
  #previewwrap.empty::after{content:attr(data-empty);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#46587a;font-size:14px;}
  #previewcanvas{width:176px;height:176px;background:#05070d;border:2px solid #1c2942;}
  .stats{margin-top:8px;}
  .statrow{display:flex;align-items:center;margin:5px 0;font-size:13px;}
  .statrow .lbl{width:64px;color:#bcd;}
  .statrow .barwrap{flex:1;height:14px;background:#0a1020;border:1px solid #233;border-radius:4px;overflow:hidden;margin:0 8px;}
  .statrow .bar{height:100%;width:0;} .statrow .val{width:34px;text-align:right;font-weight:bold;}
  .bar.atk{background:#ff5a6a;} .bar.def{background:#46d369;} .bar.spd{background:#5ad6ff;}
  .clr-atk{color:#ff8a95;}.clr-def{color:#7ce8a3;}.clr-spd{color:#9fe3ff;}
  #skills-head{font-size:14px;margin:8px 0 4px;color:#ffd24a;}
  #skilllist{display:grid;gap:7px;}
  .skillcard{background:#101a30;border-left:5px solid #5aa0ff;border-radius:6px;padding:8px 10px;}
  .skillcard.magic{border-left-color:#c07bff;}
  .skillcard b{font-size:15px;} .skillcard span{display:block;font-size:11px;color:#9ab;margin-top:3px;}
  /* レア度による色分け（技・パッシブ共通）。S=虹色グラデの太文字／A=金／B=銀。他クラスの色に勝つよう!important */
  .rar-S{font-weight:900!important;background:repeating-linear-gradient(135deg,#ff5a6a 0,#ffa54a .3em,#ffe24a .6em,#7cff9c .9em,#5ad6ff 1.2em,#c07bff 1.5em,#ff6ad5 1.8em,#ff5a6a 2.1em)!important;-webkit-background-clip:text!important;background-clip:text!important;-webkit-text-fill-color:transparent!important;color:transparent!important;text-shadow:none!important;}
  .rar-A{color:#ffd24a!important;-webkit-text-fill-color:#ffd24a!important;text-shadow:none!important;}
  .rar-B{color:#cfd8e2!important;-webkit-text-fill-color:#cfd8e2!important;text-shadow:none!important;}
  #passives-head{font-size:14px;margin:8px 0 4px;color:#ffd24a;}
  #passivelist{display:grid;gap:7px;}
  .passcard{display:flex;align-items:center;gap:8px;background:#1a1530;border-left:5px solid #ffd24a;border-radius:6px;padding:8px 10px;}
  .passcard b{color:#ffd24a;font-size:15px;} .passcard span{font-size:13px;color:#ecdca6;}
  /* 名前入力＋保存／ほぞんキャラ一覧 */
  #namerow{display:flex;align-items:center;gap:8px;margin:10px 0 8px;}
  #name-label{font-size:13px;color:#9ab;white-space:nowrap;}
  #nameinput{flex:1;min-width:0;font-size:16px;padding:8px 10px;border-radius:8px;border:2px solid #2c416e;background:#0b1322;color:#e2ecfb;}
  #savedlist{display:grid;gap:8px;}
  .savedcard{display:flex;align-items:center;gap:10px;background:#0d1424;border:2px solid #243a63;border-radius:10px;padding:8px;}
  .savedthumb{width:48px;height:48px;border-radius:6px;background:#05070d;flex:none;}
  .savedinfo{flex:1;min-width:0;text-align:left;}
  .savedname{font-size:15px;font-weight:bold;color:#e2ecfb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .savedstat{font-size:12px;color:#9ab;margin-top:2px;}
  .savedbtns{display:flex;gap:6px;flex:none;}
  .saveduse{width:auto;background:#1f6feb;font-size:13px;padding:9px 12px;}
  .savedgift{width:auto;background:#3a2a6e;border-color:#7a5cff;font-size:16px;padding:9px 11px;}
  .saveddel{width:auto;background:#5a2230;border-color:#6e2c3e;font-size:16px;padding:9px 11px;}
  #saved-receive{margin-top:12px;background:#3a2a6e;border-color:#7a5cff;}
  #saved-empty{color:#9ab;font-size:13px;line-height:1.7;margin:24px 10px;}
  #setup-hint{font-size:11px;color:#7e93b5;text-align:center;margin:4px 0;}

  /* QR */
  #screen-qrhub,#screen-qrshow,#screen-qrscan{text-align:center;padding-top:6px;}
  #qrhub-title,#qrshow-title,#qrscan-title{font-size:20px;margin:6px 0 10px;color:#ff9ad0;}
  #qrhub-preview{width:96px;height:96px;border:2px solid #1c2942;background:#05070d;margin:4px auto 10px;display:block;}
  #qrhub-hint,#qrshow-inst,#qrscan-inst{font-size:13px;color:#c3d4ec;line-height:1.75;margin:10px 6px;text-align:left;}
  #qrhub-hint b,#qrshow-inst b,#qrscan-inst b{color:#ffd24a;}
  #qrcanvas{width:340px;max-width:94%;height:auto;background:#fff;border:7px solid #fff;border-radius:6px;margin:6px auto;display:block;}
  #qrstatus,#qrshow-status{font-size:13px;color:#ffd24a;min-height:38px;margin-top:10px;line-height:1.5;}
  .qrbtn{margin-bottom:9px;}
  #qrshowbtn{background:#3a2a6e;border-color:#7a5cff;} #qrscanbtn{background:#5a2a4a;border-color:#ff5aa0;}

  /* バトル */
  #screen-battle{padding-top:14px;}   /* HUD上に約20px(app6px+14px)の余白でバランス */
  .hud{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px;}
  .pcard{flex:1;background:#0d1424;border:2px solid #243a63;border-radius:8px;padding:7px 9px;}
  .pcard.p2{text-align:right;}
  .pname{font-size:14px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hpbarwrap{height:13px;background:#05070d;border:1px solid #243;border-radius:4px;overflow:hidden;margin:4px 0 2px;}
  .hpfill{height:100%;width:100%;background:#46d369;transition:width .35s;}
  .hpnum{font-size:11px;color:#cfe0f5;}
  .fstat{display:flex;flex-wrap:wrap;gap:2px 8px;margin:4px 0 2px;font-size:13px;}
  .pcard.p2 .fstat{justify-content:flex-end;}
  .fstat .fseg{white-space:nowrap;}
  .fstat .fseg i{font-style:normal;color:#7e93b5;font-size:10px;margin-right:1px;}
  .fstat .fseg b{font-weight:bold;color:#e2ecfb;}
  .fstat .fseg.up i,.fstat .fseg.up b{color:#46ff8c;}   /* 上昇中=緑（魔法/パッシブ）。元に戻れば通常色 */
  .pstatus{font-size:11px;color:#ffd24a;min-height:14px;}
  #stageinfo{text-align:center;font-size:12px;color:#ffd24a;margin:2px 0 4px;display:none;}
  #battlecanvas{width:100%;height:auto;display:block;background:#0b0f1a;border:2px solid #1c2942;border-radius:8px;}
  #turnlabel{text-align:center;font-size:17px;font-weight:bold;margin:4px 0 3px;min-height:20px;}
  #battlelog{background:#05070d;border:1px solid #1c2942;border-radius:6px;padding:7px 10px;font-size:12.5px;line-height:1.5;white-space:pre-line;min-height:54px;color:#cfe0f5;}
  #commands{display:none;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px;}
  .cmd{text-align:left;padding:8px 10px;} .cmd.phys{border-color:#5aa0ff;} .cmd.magic{border-color:#c07bff;background:#241a3a;}
  .cmd .cmdname{display:block;font-size:15px;} .cmd .cmddesc{display:block;font-size:10px;color:#9ab;margin-top:3px;font-weight:normal;}
  .cmd.used{filter:grayscale(1);}
  .surrender{display:none;margin-top:7px;background:#2a1822;border:2px solid #6e2c3e;color:#ffb0c0;font-size:13px;padding:8px;box-shadow:0 3px 0 #1a0e14;}
  /* バトル中：自分のパッシブ（特技と降参の間）。相手のぶんは表示しない */
  .bpassives{display:none;flex-wrap:wrap;align-items:center;gap:6px;margin-top:6px;}
  .bpassives .bpass-label{width:100%;font-size:11px;color:#ffd24a;}
  .bpassives .bpass{font-size:11px;background:#1a1530;border:1px solid #5a4a1e;border-left:4px solid #ffd24a;border-radius:6px;padding:5px 8px;color:#ecdca6;}

  /* 降参かくにん */
  #confirmbox{background:#0d1424;border:2px solid #6e2c3e;border-radius:12px;padding:20px;max-width:340px;width:90%;text-align:center;}
  #confirm-msg{font-size:16px;line-height:1.6;color:#ffe0e6;margin-bottom:18px;}
  #confirmbox button{margin-top:8px;} #confirmbox .danger{background:#5a2230;border-color:#ff5a6a;}

  /* オーバーレイ */
  .overlay{display:none;position:absolute;inset:0;background:rgba(3,5,10,.93);z-index:100;align-items:center;justify-content:center;}
  #resultfx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
  #resultbox{text-align:center;padding:24px;max-width:380px;width:100%;position:relative;z-index:1;}
  #resultwin{font-size:28px;font-weight:bold;text-shadow:2px 2px 0 #000;margin-bottom:6px;}
  #resultsub{color:#8aa0c0;font-size:13px;margin-bottom:22px;white-space:pre-line;line-height:1.7;}
  #resultbox button{margin-top:8px;}
  #settingsbox{background:#0d1424;border:2px solid #38507e;border-radius:12px;padding:18px;max-width:360px;width:90%;}
  #set-title{text-align:center;font-size:20px;margin-bottom:14px;color:#ffd24a;}
  .setrow{display:flex;align-items:center;justify-content:space-between;margin:12px 0;}
  .setrow .lab{font-size:14px;}
  .setrow .toggle{width:auto;padding:7px 16px;font-size:14px;background:#2a8a5a;border-color:#46d369;}
  .setrow .toggle.off{background:#5a2230;border-color:#ff5a6a;}
  .volwrap{display:flex;align-items:center;gap:10px;}
  #vol-slider{width:120px;height:22px;accent-color:#46d369;cursor:pointer;}
  .volval{font-size:13px;color:#9fe3ff;min-width:58px;text-align:right;font-weight:bold;}
  .setrow.col{flex-direction:column;align-items:stretch;gap:8px;}
  .databtns{display:flex;gap:8px;}
  .setrow.col .minib{flex:1;width:auto;padding:9px 10px;font-size:14px;}
  #backupbox{background:#0d1424;border:2px solid #38507e;border-radius:12px;padding:18px;max-width:360px;width:90%;text-align:center;}
  #backupbox h2{font-size:18px;margin:0 0 8px;color:#ffd24a;}
  #bk-desc{font-size:13px;color:#cfe0f5;line-height:1.6;margin:0 0 10px;}
  #bk-text{width:100%;height:120px;resize:none;font-family:"Courier New",monospace;font-size:12px;background:#04060a;color:#9fe3ff;border:2px solid #2c416e;border-radius:8px;padding:8px;box-sizing:border-box;word-break:break-all;}
  #bk-hint{font-size:11px;color:#ffd24a;line-height:1.5;margin:8px 0 4px;}
  #backupbox button{margin-top:8px;}
  .seg{display:flex;border:2px solid #2c416e;border-radius:8px;overflow:hidden;}
  .seg button{width:auto;padding:7px 14px;font-size:13px;border:none;border-radius:0;background:#0d1424;color:#7e93b5;box-shadow:none;}
  .seg button.on{background:#1f6feb;color:#fff;}
  #set-close{margin-top:16px;}
  #langbox{background:#0d1424;border:2px solid #38507e;border-radius:12px;padding:18px;max-width:340px;width:90%;}
  #lang-title{text-align:center;font-size:18px;margin:0 0 14px;color:#ffd24a;}
  #langlist{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:56vh;overflow-y:auto;}
  .langitem{width:100%;padding:12px 8px;font-size:15px;background:#1b2740;border:2px solid #38507e;}
  .langitem.on{background:#1f6feb;border-color:#5aa0ff;color:#fff;}
  #lang-close{margin-top:14px;}

  /* 観戦モード（トーナメント / そうあたりせん） */
  #screen-watch{padding-top:6px;}
  #watch-title{text-align:center;font-size:20px;margin:6px 0 6px;color:#ffd24a;}
  #watch-sub{text-align:center;font-size:12.5px;color:#9fe3ff;min-height:18px;margin:0 6px 10px;line-height:1.5;}
  #watch-board{display:grid;gap:10px;}
  .wround{background:#0d1424;border:2px solid #243a63;border-radius:10px;padding:8px 10px;}
  .wround-name{font-size:13px;font-weight:bold;color:#ffd24a;margin-bottom:6px;letter-spacing:.5px;}
  .wmatch{display:flex;align-items:center;gap:6px;padding:4px 2px;border-top:1px solid #17233d;font-size:14px;}
  .wmatch:first-of-type{border-top:none;}
  .wmatch .wname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#cfe0f5;}
  .wmatch .wname.wwin{color:#ffd24a;font-weight:bold;}
  .wmatch .wvs{flex:none;font-size:11px;color:#7e93b5;font-weight:bold;}
  .wmatch .wbye{flex:none;font-size:11px;color:#9be0c0;background:#0f1f18;border:1px solid #2c6e54;border-radius:6px;padding:2px 7px;}
  .wstand{display:flex;align-items:center;gap:8px;padding:6px 2px;border-top:1px solid #17233d;font-size:14px;}
  .wstand:first-of-type{border-top:none;}
  .wstand .wname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e2ecfb;}
  .wstand .wwins{flex:none;font-weight:bold;color:#9fe3ff;}
  #watch-quit{margin-top:14px;background:#2a1822;border:2px solid #6e2c3e;color:#ffb0c0;}

  /* スピードバー（観戦中だけ表示・上部中央のピル列。通常プレイでは絶対に出さない） */
  #speedbar{position:absolute;top:2px;left:0;right:0;z-index:70;justify-content:center;
    align-items:center;flex-wrap:wrap;gap:4px;padding:0 6px;pointer-events:none;}
  #speedbar .spdlabel{pointer-events:none;font-size:10px;color:#9fc0ea;margin-right:2px;
    background:rgba(7,10,18,.82);border-radius:6px;padding:2px 6px;}
  .spdbtn{pointer-events:auto;width:auto;padding:4px 7px;font-size:12px;line-height:1;
    background:rgba(20,32,58,.92);border:2px solid #3a567f;border-radius:8px;box-shadow:none;color:#cfe0f5;}
  .spdbtn.on{background:#1f6feb;border-color:#5aa0ff;color:#fff;}
</style>
</head>
<body>
<div id="frame">

<!-- 上部バー（フレーム内・固定。全画面に常時表示） -->
<div id="topbar">
  <button id="gearbtn" aria-label="settings">⚙</button>
  <button id="langbtn" class="langbtn">🌐 日本語</button>
</div>

<div id="app">

  <!-- タイトル -->
  <section id="screen-title" class="screen active">
    <div class="logo"><span class="logo-main">ドットバトル</span><span class="logo-vs">VS</span><small>DOT BATTLE VS</small></div>
    <div class="badges"><span id="b1"></span><span id="b2"></span><span id="b3"></span></div>
    <p id="subtitle"></p>
    <div id="battlemaster" style="display:none;"></div>
    <div class="modes">
      <button id="mode-solo" class="bigbtn"></button>
      <button id="mode-hotseat" class="bigbtn"></button>
      <button id="mode-qr" class="bigbtn"></button>
      <button id="mode-mychar" class="bigbtn"></button>
    </div>
    <a id="soyogilink" href="https://soyogi.hp.peraichi.com/top" target="_blank" rel="noopener noreferrer"></a>
  </section>

  <!-- じぶんのキャラで（保存キャラで対戦 / 保存キャラ ランダム5連戦） -->
  <section id="screen-mychar" class="screen">
    <h2 id="mychar-title"></h2>
    <div id="mychar-list" class="modes"></div>
    <button id="mychar-back" class="backbtn"></button>
  </section>

  <!-- 難易度（ソロ：解放式・クリアでバッジ＆次が出現） -->
  <section id="screen-difficulty" class="screen">
    <h2 id="diff-title"></h2>
    <div id="diff-list" class="modes"></div>
    <button id="diff-back" class="backbtn"></button>
  </section>

  <!-- セットアップ（共通） -->
  <section id="screen-setup" class="screen">
    <h2 id="setuptitle"></h2>
    <div class="row" style="margin-bottom:8px;">
      <button id="btncamera"></button><button id="btnupload"></button>
    </div>
    <button id="btnsaved" class="qrbtn" style="margin-bottom:10px;"></button>
    <div class="panel">
      <div id="previewwrap" class="empty" data-empty="?">
        <canvas id="previewcanvas" class="pixel" width="160" height="160"></canvas>
      </div>
      <div id="setupresult" style="display:none;">
        <div class="stats">
          <div class="statrow"><span class="lbl clr-atk" id="lbl-atk"></span><span class="barwrap"><span id="baratk" class="bar atk"></span></span><span id="statatk" class="val">0</span></div>
          <div class="statrow"><span class="lbl clr-def" id="lbl-def"></span><span class="barwrap"><span id="bardef" class="bar def"></span></span><span id="statdef" class="val">0</span></div>
          <div class="statrow"><span class="lbl clr-spd" id="lbl-spd"></span><span class="barwrap"><span id="barspd" class="bar spd"></span></span><span id="statspd" class="val">0</span></div>
        </div>
        <h3 id="skills-head"></h3>
        <div id="skilllist"></div>
        <h3 id="passives-head"></h3>
        <div id="passivelist"></div>
        <div id="namerow"><span id="name-label"></span><input id="nameinput" type="text" maxlength="8" autocomplete="off"></div>
        <button id="savebtn" class="qrbtn"></button>
      </div>
    </div>
    <p id="setup-hint"></p>
    <div class="row">
      <button id="retakebtn"></button>
      <button id="confirmbtn" class="accent" disabled></button>
    </div>
    <button id="setup-back" class="backbtn"></button>
  </section>

  <!-- ほぞんした キャラ（最大9体・呼出/削除） -->
  <section id="screen-saved" class="screen">
    <h2 id="saved-title"></h2>
    <p id="saved-empty" style="display:none;"></p>
    <div id="savedlist"></div>
    <button id="saved-receive" class="giftbtn"></button>
    <button id="saved-back" class="backbtn"></button>
  </section>

  <!-- QR ハブ -->
  <section id="screen-qrhub" class="screen">
    <h2 id="qrhub-title"></h2>
    <canvas id="qrhub-preview" class="pixel" width="96" height="96"></canvas>
    <p id="qrhub-hint"></p>
    <button id="qrshowbtn" class="qrbtn"></button>
    <button id="qrscanbtn" class="qrbtn"></button>
    <button id="qr-back" class="backbtn"></button>
  </section>

  <!-- QR こうかん／たいせん じゅんび（自分のQRを常時表示＋相手を読取＋たたかう） -->
  <section id="screen-qrshow" class="screen">
    <h2 id="qrshow-title"></h2>
    <canvas id="qrcanvas" width="340" height="340"></canvas>
    <p id="qrshow-inst"></p>
    <button id="qrshow-scan" class="primary qrbtn"></button>
    <p id="qrshow-status"></p>
    <button id="qrshow-fight" class="accent qrbtn" disabled></button>
    <button id="qrshow-back" class="backbtn"></button>
  </section>

  <!-- QR 読取 -->
  <section id="screen-qrscan" class="screen">
    <h2 id="qrscan-title"></h2>
    <p id="qrscan-inst"></p>
    <button id="qrscan-open" class="primary"></button>
    <p id="qrstatus"></p>
    <button id="qrscan-back" class="backbtn"></button>
  </section>

  <!-- バトル -->
  <section id="screen-battle" class="screen">
    <div class="hud">
      <div class="pcard p1">
        <div class="pname" id="name0">1P</div>
        <div class="hpbarwrap"><div class="hpfill" id="hpfill0"></div></div>
        <div class="hpnum" id="hpnum0">999 / 999</div>
        <div class="fstat" id="fstat0"></div><div class="pstatus" id="stat0"></div>
      </div>
      <div class="pcard p2">
        <div class="pname" id="name1">2P</div>
        <div class="hpbarwrap"><div class="hpfill" id="hpfill1"></div></div>
        <div class="hpnum" id="hpnum1">999 / 999</div>
        <div class="fstat" id="fstat1"></div><div class="pstatus" id="stat1"></div>
      </div>
    </div>
    <div id="stageinfo"></div>
    <canvas id="battlecanvas" class="pixel" width="320" height="210"></canvas>
    <div id="turnlabel"></div>
    <div id="battlelog"></div>
    <div id="commands"></div>
    <div id="battlepassives" class="bpassives"></div>
    <button id="surrenderbtn" class="surrender"></button>
  </section>

  <!-- 観戦モード（トーナメント / そうあたりせん：対戦表・順位表） -->
  <section id="screen-watch" class="screen">
    <h2 id="watch-title"></h2>
    <div id="watch-sub"></div>
    <div id="watch-board"></div>
    <button id="watch-quit" class="backbtn"></button>
  </section>
</div>

<!-- 観戦スピードバー（観戦中だけ表示） -->
<div id="speedbar" style="display:none"></div>

<!-- リザルト -->
<div id="resultoverlay" class="overlay">
  <canvas id="resultfx"></canvas>
  <div id="resultbox">
    <div id="resultwin"></div>
    <div id="resultsub"></div>
    <button id="restartbtn" class="primary"></button>
    <button id="totitlebtn"></button>
  </div>
</div>

<!-- 設定 -->
<div id="settingsoverlay" class="overlay">
  <div id="settingsbox">
    <h2 id="set-title"></h2>
    <div class="setrow"><span class="lab" id="set-lang-label"></span>
      <button id="setlangbtn" class="minib"></button></div>
    <div class="setrow"><span class="lab" id="set-sound-label"></span>
      <div class="volwrap"><input type="range" id="vol-slider" min="0" max="3" step="0.1" value="1"><span id="vol-val" class="volval"></span></div></div>
    <div class="setrow"><span class="lab" id="set-effects-label"></span><button id="toggle-effects" class="toggle"></button></div>
    <div class="setrow"><span class="lab" id="set-vibrate-label"></span><button id="toggle-vibrate" class="toggle"></button></div>
    <div class="setrow col"><span class="lab" id="set-data-label"></span>
      <div class="databtns"><button id="bk-export-btn" class="minib accent"></button><button id="bk-import-btn" class="minib"></button></div></div>
    <button id="set-close" class="primary"></button>
  </div>
</div>

<!-- 言語選択（🌐→リスト。I18Nに存在する言語だけ表示＝14言語まで拡張可） -->
<div id="langoverlay" class="overlay">
  <div id="langbox">
    <h2 id="lang-title"></h2>
    <div id="langlist"></div>
    <button id="lang-close" class="primary"></button>
  </div>
</div>

<!-- データのバックアップ/復元（戦士・バッジ・設定を1コードに） -->
<div id="backupoverlay" class="overlay">
  <div id="backupbox">
    <h2 id="bk-title"></h2>
    <p id="bk-desc"></p>
    <textarea id="bk-text" rows="5" spellcheck="false" autocomplete="off"></textarea>
    <p id="bk-hint"></p>
    <button id="bk-copy" class="accent"></button>
    <button id="bk-restore" class="primary"></button>
    <button id="bk-close"></button>
  </div>
</div>

<!-- 降参かくにん（誤タップ防止） -->
<div id="confirmoverlay" class="overlay">
  <div id="confirmbox">
    <div id="confirm-msg"></div>
    <button id="confirm-no" class="primary"></button>
    <button id="confirm-yes" class="danger"></button>
  </div>
</div>

</div><!-- /#frame -->

<input type="file" id="filecamera" accept="image/*" capture="environment" style="display:none">
<input type="file" id="fileupload" accept="image/*" style="display:none">
<input type="file" id="qrfile" accept="image/*" capture="environment" style="display:none">

  function finalize(base) {
    var s = { atk: base.atk, def: base.def, spd: base.spd };
    var keys = ["atk", "def", "spd"], from = keys[randInt(0, 2)], to = keys[randInt(0, 2)];   // 合計256を保ったまま0〜7ぶんを1ステから別ステへ移す小さな揺らぎ
    var amt = Math.min(randInt(0, 7), s[from] - 25, 200 - s[to]);   // fromが25未満/toが200超にならない範囲
    if (from !== to && amt > 0) { s[from] -= amt; s[to] += amt; }
    return { atk: s.atk, def: s.def, spd: s.spd };
  }
  function buildFighter(data, opts) {
    var f = {
      label: (data.name || opts.label), index: opts.index,
      pixels: data.pixels, base: data.base, skills: data.skills, passives: data.passives || [],
      final: finalize(data.base),
      maxHp: opts.maxHp || 999, regen: opts.regen || 0, isAI: !!opts.isAI, doubleAct: opts.doubleAct || 0, extraUsed: false, dblUsed: false,
      hp: opts.maxHp || 999, alpha: 1,
      buffs: { speedup: null, allup: null, barrier: null }, bind: null, poison: null, used: {}
    };
    f.regen += 30 * pcount(f, "regen");   // ⑨ 毎ターンHP回復30（難易度regenに加算・重複で60）
    f.endure = pcount(f, "endure");       // ⑪ HP1で耐える 残り回数（重複で2回）
    if (pcount(f, "lucky") > 0) { f.luckyStat = ["atk", "def", "spd"][randInt(0, 2)]; f.luckyAmt = randInt(50, 200); } else { f.luckyStat = null; f.luckyAmt = 0; }   // ⑯ ラッキー：強化ステと量(50〜200)
    return f;
  }

  /* ============================================================
     観戦モード（トーナメント / そうあたりせん）
     ・保存キャラだけの CPU 同士バトルを見るだけのモード。
     ・組み合わせ／順位計算はバトルの勝敗にしか依存しない純粋関数に分離
       （下の __WATCH_PURE__ 区間・DOM/t()/Math.random を触らない＝機械検証対象）。
     ============================================================ */
  /*__WATCH_PURE_BEGIN__*/
  // N 以上の最小の2べき（2/4/8/16…）。参加2〜9人なら 2/4/8/16 を返す。
  function nextPow2(n) { var s = 2; while (s < n) s *= 2; return s; }
  // 配列を rng(0〜1未満を返す関数) でフィッシャー・イェーツ・シャッフルした「新しい配列」を返す。
  function shuffleArr(arr, rng) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i + 1)); var tmp = a[i]; a[i] = a[j]; a[j] = tmp; }
    return a;
  }
  // トーナメント表を作る。entrant は参加者ID（0..N-1）。bye(シード=null)は各1回戦に最大1つだけ入れて
  // 「bye 同士の対戦」を絶対に作らない（先頭 byes ペアに実キャラ1人＋bye、残りは実キャラ2人）。
  // 返り値 { size, rounds }。rounds[0]=1回戦。各 match={a,b,winner,bye}。bye は winner を即確定。
  function buildBracket(entrantIds, rng) {
    var n = entrantIds.length, size = nextPow2(n), byes = size - n;
    var reals = shuffleArr(entrantIds, rng), ri = 0, pairCount = size / 2;
    var round0 = [];
    for (var p = 0; p < pairCount; p++) {
      if (p < byes) { var aB = reals[ri++]; round0.push({ a: aB, b: null, winner: aB, bye: true }); }   // 実キャラ vs シード（自動勝ち上がり）
      else { var aR = reals[ri++], bR = reals[ri++]; round0.push({ a: aR, b: bR, winner: null, bye: false }); }
    }
    var rounds = [round0], count = pairCount;
    while (count > 1) { count = count / 2; var rnd = []; for (var q = 0; q < count; q++) rnd.push({ a: null, b: null, winner: null, bye: false }); rounds.push(rnd); }
    if (rounds.length > 1) {   // bye の勝者を次のラウンドへ配置（bye は1回戦だけに存在するのでここで確定）
      for (var mi = 0; mi < round0.length; mi++) {
        if (round0[mi].winner != null) { var dest = rounds[1][Math.floor(mi / 2)]; if (mi % 2 === 0) dest.a = round0[mi].winner; else dest.b = round0[mi].winner; }
      }
    }
    return { size: size, rounds: rounds };
  }
  // 1試合の勝者を確定し、次ラウンドの対応スロットへ勝者を送る（bracket を書き換える純粋操作）。
  function resolveBracketMatch(bracket, roundIdx, matchIdx, winnerId) {
    var m = bracket.rounds[roundIdx][matchIdx]; m.winner = winnerId;
    if (roundIdx + 1 < bracket.rounds.length) { var dest = bracket.rounds[roundIdx + 1][Math.floor(matchIdx / 2)]; if (matchIdx % 2 === 0) dest.a = winnerId; else dest.b = winnerId; }
  }
  // 次に行うべき「両者確定・未決着」の試合を上のラウンドから探す。無ければ null。
  function pendingBracketMatch(bracket) {
    for (var r = 0; r < bracket.rounds.length; r++) {
      var ms = bracket.rounds[r];
      for (var i = 0; i < ms.length; i++) { var m = ms[i]; if (m.winner == null && m.a != null && m.b != null) return { roundIdx: r, matchIdx: i }; }
    }
    return null;
  }
  // 準決勝（決勝の1つ前のラウンド）が全て決着済みか。size=2（決勝のみ）は準決勝が無いので false。
  function semifinalsDone(bracket) {
    var sr = bracket.rounds.length - 2; if (sr < 0) return false;
    var ms = bracket.rounds[sr];
    for (var i = 0; i < ms.length; i++) if (ms[i].winner == null) return false;
    return true;
  }
  // 準決勝の「実キャラの敗者」ID一覧（bye の試合には敗者はいない）。3位決定戦の対象を決めるのに使う。
  function bracketSemifinalLosers(bracket) {
    var sr = bracket.rounds.length - 2, out = []; if (sr < 0) return out;
    var ms = bracket.rounds[sr];
    for (var i = 0; i < ms.length; i++) { var m = ms[i]; if (m.bye || m.winner == null || m.a == null || m.b == null) continue; out.push(m.winner === m.a ? m.b : m.a); }
    return out;
  }
  // 総当たりの全ペア（i<j）を作り、rng でシャッフルして [ [a,b], ... ] を返す。
  function roundRobinPairs(ids, rng) {
    var pairs = [];
    for (var i = 0; i < ids.length; i++) for (var j = i + 1; j < ids.length; j++) pairs.push([ids[i], ids[j]]);
    return shuffleArr(pairs, rng);
  }
  // ids を wins(勝数マップ) の降順でグループ化。同数は id 昇順で安定。返り値は [[同率ids],...]（勝数の多い順）。
  function groupByWins(ids, wins) {
    var arr = ids.slice();
    arr.sort(function (x, y) { var wx = wins[x] || 0, wy = wins[y] || 0; if (wy !== wx) return wy - wx; return x - y; });
    var groups = [], cur = null, curW = null;
    for (var i = 0; i < arr.length; i++) { var w = wins[arr[i]] || 0; if (cur === null || w !== curW) { cur = [arr[i]]; curW = w; groups.push(cur); } else cur.push(arr[i]); }
    return groups;
  }
  /*__WATCH_PURE_END__*/

  // ---- 観戦：ここから下は DOM / バトルエンジンに触れる（非純粋） ----
  var watchAdvanceToken = 0;   // 進行タイマーの世代番号。常に最新の1本しか進行できない＝二重進行の構造的防止
  function rngReal() { return Math.random(); }   // 本番の乱数（純粋関数へ引数で渡す）
  function pairsToMatches(pairs) { var out = []; for (var i = 0; i < pairs.length; i++) out.push({ a: pairs[i][0], b: pairs[i][1], winner: null }); return out; }
  function getWatchSpeed() { return (WATCH_SPEEDS.indexOf(settings.watchSpeed) >= 0) ? settings.watchSpeed : 1; }
  function buildWatchEntrants() {
    var saved = loadSaved(), out = [];
    for (var i = 0; i < saved.length; i++) { var d = decodeFighter(saved[i]); if (d) out.push({ data: d, name: d.name || t("common.noname") }); }   // 欠番（null）はスキップ
    return out;
  }
  function entrantName(id) { return (watchEntrants[id] && watchEntrants[id].name) || t("common.noname"); }

  function startTournament() {
    var entrants = buildWatchEntrants();
    if (entrants.length < 2) { alert(t("watch.need_two")); return; }
    watchEntrants = entrants;
    var ids = []; for (var i = 0; i < entrants.length; i++) ids.push(i);
    watch = { type: "tournament", current: null, phaseInfo: null, tourney: { bracket: buildBracket(ids, rngReal), third: null, thirdReady: false, thirdId: null } };
    watchAdvanceToken++;   // 旧観戦の保留タイマーを無効化
    $("resultoverlay").style.display = "none";   // 前のリザルトが残っていても閉じる
    BSPEED = getWatchSpeed(); renderSpeedbar(); watchShowSpeedbar();
    showScreen("watch"); renderWatchScreen();
    watchScheduleAdvance(tournamentAdvance, 900);   // 表を少し見せてから開始
  }
  function startLeague() {
    var entrants = buildWatchEntrants();
    if (entrants.length < 2) { alert(t("watch.need_two")); return; }
    watchEntrants = entrants;
    var ids = []; for (var i = 0; i < entrants.length; i++) ids.push(i);
    watch = { type: "league", current: null, phaseInfo: null, league: { ids: ids, matches: pairsToMatches(roundRobinPairs(ids, rngReal)), idx: 0, wins: {}, finalized: [], tasks: [], pf: null, phase: "base" } };
    watchAdvanceToken++;   // 旧観戦の保留タイマーを無効化
    $("resultoverlay").style.display = "none";   // 前のリザルトが残っていても閉じる
    BSPEED = getWatchSpeed(); renderSpeedbar(); watchShowSpeedbar();
    showScreen("watch"); renderWatchScreen();
    watchScheduleAdvance(leagueAdvance, 900);
  }
  // 1試合を観戦バトルとして開始（両者AI）。勝者IDは endBattle の watch 分岐→watchMatchEnd 経由で onResult に渡る。
  function playWatchMatch(idA, idB, onResult) {
    if (!watch) return;
    watch.current = { idA: idA, idB: idB, onResult: onResult };
    var f0 = buildFighter(watchEntrants[idA].data, { label: entrantName(idA), index: 0, isAI: true });
    var f1 = buildFighter(watchEntrants[idB].data, { label: entrantName(idB), index: 1, isAI: true });
    watchShowSpeedbar();
    beginBattle(f0, f1, { kind: "watch" });
  }
  function watchMatchEnd(winnerId) {
    if (!watch || !watch.current) return;
    var cb = watch.current.onResult; watch.current = null;
    if (cb) cb(winnerId);
  }
  // 観戦進行タイマーの一元スケジューラ: 世代トークンが一致する最新の1本だけが発火できる
  function watchScheduleAdvance(nextFn, ms) {
    var token = ++watchAdvanceToken;
    bwait(function () { if (watch && token === watchAdvanceToken) nextFn(); }, ms);
  }
  // 試合後：対戦表／順位表を 2200/BSPEED ms 見せてから次の進行へ。
  function afterWatchMatchBoard(nextFn) {
    if (!watch) return;
    showScreen("watch"); renderWatchScreen(); watchShowSpeedbar();
    watchScheduleAdvance(nextFn, 2200);
  }

  /* --- トーナメント進行 --- */
  function tournamentAdvance() {
    if (!watch) return;
    var tr = watch.tourney, bracket = tr.bracket;
    if (!tr.thirdReady && semifinalsDone(bracket)) {   // 準決勝が終わったら3位決定の段取り
      tr.thirdReady = true;
      var losers = bracketSemifinalLosers(bracket);
      if (losers.length === 2) tr.third = { a: losers[0], b: losers[1], winner: null };   // 実キャラ2人→3位決定戦
      else if (losers.length === 1) tr.thirdId = losers[0];   // 1人だけ→自動で3位
    }
    if (tr.third && tr.third.winner == null) {   // 3位決定戦は決勝より先
      watch.phaseInfo = { type: "third", a: tr.third.a, b: tr.third.b };
      playWatchMatch(tr.third.a, tr.third.b, function (wid) { tr.third.winner = wid; tr.thirdId = wid; afterWatchMatchBoard(tournamentAdvance); });
      return;
    }
    var pm = pendingBracketMatch(bracket);
    if (pm) {
      var match = bracket.rounds[pm.roundIdx][pm.matchIdx];
      watch.phaseInfo = { type: "round", players: bracket.size >> pm.roundIdx, a: match.a, b: match.b };
      playWatchMatch(match.a, match.b, function (wid) { resolveBracketMatch(bracket, pm.roundIdx, pm.matchIdx, wid); afterWatchMatchBoard(tournamentAdvance); });
      return;
    }
    tournamentFinish();
  }
  function tournamentFinish() {
    var bracket = watch.tourney.bracket, fm = bracket.rounds[bracket.rounds.length - 1][0];
    var first = fm.winner, second = (fm.winner === fm.a) ? fm.b : fm.a, third = watch.tourney.thirdId;
    var lines = ["🥇 " + entrantName(first), "🥈 " + entrantName(second)];
    if (third != null) lines.push("🥉 " + entrantName(third));
    showWatchVictory(lines.join("\n"));
  }

  /* --- そうあたりせん進行（基本フェーズ→順位確定。1〜3位のタイはプレーオフで単独化） --- */
  function leagueAdvance() {
    if (!watch) return;
    var lg = watch.league;
    if (lg.phase === "base") {
      if (lg.idx < lg.matches.length) {
        var mm = lg.matches[lg.idx];
        watch.phaseInfo = { type: "base", a: mm.a, b: mm.b };
        playWatchMatch(mm.a, mm.b, function (wid) { mm.winner = wid; lg.wins[wid] = (lg.wins[wid] || 0) + 1; lg.idx++; afterWatchMatchBoard(leagueAdvance); });
        return;
      }
      lg.tasks = [{ type: "place", groups: groupByWins(lg.ids, lg.wins), startRank: 1 }];   // 基本フェーズ終了→順位確定へ
      lg.phase = "resolve"; leagueAdvance(); return;
    }
    if (lg.phase === "resolve") {
      if (lg.pf) {   // プレーオフ（順位決定用の別枠。基本フェーズの勝数には加算しない）進行中
        var pf = lg.pf;
        if (pf.idx < pf.matches.length) {
          var pm = pf.matches[pf.idx];
          watch.phaseInfo = { type: "playoff", a: pm.a, b: pm.b };
          playWatchMatch(pm.a, pm.b, function (wid) { pm.winner = wid; pf.wins[wid] = (pf.wins[wid] || 0) + 1; pf.idx++; afterWatchMatchBoard(leagueAdvance); });
          return;
        }
        lg.tasks.push({ type: "place", groups: groupByWins(pf.members, pf.wins), startRank: pf.startRank });   // プレーオフの勝数で厳密順序
        lg.pf = null; leagueAdvance(); return;
      }
      if (lg.tasks.length) {
        var task = lg.tasks.pop();
        if (task.type === "playoff") { lg.pf = { members: task.members, matches: pairsToMatches(roundRobinPairs(task.members, rngReal)), idx: 0, wins: {}, startRank: task.startRank }; leagueAdvance(); return; }
        leagueProcessPlace(task); leagueAdvance(); return;
      }
      leagueFinish();
    }
  }
  // 「並び済みグループ列を startRank から順位付け」。1〜3位に多人数グループが掛かったらプレーオフに回す。
  function leagueProcessPlace(task) {
    var lg = watch.league, groups = task.groups, r = task.startRank;
    for (var gi = 0; gi < groups.length; gi++) {
      var g = groups[gi];
      if (r > 3) { for (var k = 0; k < g.length; k++) lg.finalized.push({ id: g[k], rank: r }); r += g.length; }   // 4位以下は同率許容（次の順位は人数分飛ぶ）
      else if (g.length === 1) { lg.finalized.push({ id: g[0], rank: r }); r += 1; }
      else {
        var rest = groups.slice(gi + 1);
        if (rest.length) lg.tasks.push({ type: "place", groups: rest, startRank: r + g.length });   // このグループの後ろは人数分ずらして継続
        lg.tasks.push({ type: "playoff", members: g.slice(), startRank: r });   // stack(LIFO)なので後pushのプレーオフが先に処理される
        return;
      }
    }
  }
  function leagueFinish() {
    var lg = watch.league; lg.phase = "done";
    var fin = lg.finalized.slice();
    fin.sort(function (a, b) { if (a.rank !== b.rank) return a.rank - b.rank; return a.id - b.id; });
    var medals = ["🥇", "🥈", "🥉"], lines = [];
    for (var i = 0; i < fin.length; i++) {
      var e = fin[i];
      if (e.rank <= 3) lines.push(medals[e.rank - 1] + " " + entrantName(e.id));
      else lines.push(t("watch.rank", {n: e.rank}) + " " + entrantName(e.id) + "（" + t("watch.wins", {n: (lg.wins[e.id] || 0)}) + "）");
    }
    showWatchVictory(lines.join("\n"));
  }

  /* --- 観戦の画面描画 --- */
  function tourneyRoundName(players) {
    if (players >= 16) return t("watch.round_n", {n: 1});
    if (players === 8) return t("watch.round_quarter");
    if (players === 4) return t("watch.round_semi");
    if (players === 2) return t("watch.round_final");
    return t("watch.round_n", {n: 1});
  }
  function watchSubText() {
    var pi = watch && watch.phaseInfo; if (!pi) return "";
    var label;
    if (pi.type === "third") label = t("watch.round_third");
    else if (pi.type === "round") label = tourneyRoundName(pi.players);
    else if (pi.type === "playoff") label = t("watch.playoff");
    else label = t("watch.next");
    if (pi.a != null && pi.b != null) label += "  " + entrantName(pi.a) + " VS " + entrantName(pi.b);
    return label;
  }
  function renderWatchScreen() {
    if (!watch) return;
    $("watch-quit").textContent = "✕ " + t("watch.quit");
    if (watch.type === "tournament") { $("watch-title").textContent = "🏆 " + t("watch.title_tournament"); renderTournamentBoard(); }
    else { $("watch-title").textContent = "📊 " + t("watch.title_league"); renderLeagueBoard(); }
    if (watch) renderSpeedbar();
  }
  function makeMatchRow(m) {
    var row = document.createElement("div"); row.className = "wmatch";
    if (m.bye) {
      var an = document.createElement("span"); an.className = "wname wwin"; an.textContent = entrantName(m.a); row.appendChild(an);
      var bt = document.createElement("span"); bt.className = "wbye"; bt.textContent = t("watch.bye"); row.appendChild(bt);
      return row;
    }
    var aWin = (m.winner != null && m.winner === m.a), bWin = (m.winner != null && m.winner === m.b);
    var aSpan = document.createElement("span"); aSpan.className = "wname" + (aWin ? " wwin" : ""); aSpan.textContent = (aWin ? "○ " : "") + (m.a != null ? entrantName(m.a) : "…"); row.appendChild(aSpan);
    var vs = document.createElement("span"); vs.className = "wvs"; vs.textContent = "VS"; row.appendChild(vs);
    var bSpan = document.createElement("span"); bSpan.className = "wname" + (bWin ? " wwin" : ""); bSpan.textContent = (bWin ? "○ " : "") + (m.b != null ? entrantName(m.b) : "…"); row.appendChild(bSpan);
    return row;
  }
  function makeRoundBlock(bracket, r) {
    var div = document.createElement("div"); div.className = "wround";
    var h = document.createElement("div"); h.className = "wround-name"; h.textContent = tourneyRoundName(bracket.size >> r); div.appendChild(h);
    var ms = bracket.rounds[r];
    for (var i = 0; i < ms.length; i++) div.appendChild(makeMatchRow(ms[i]));

  }
  function makeThirdBlock(tr) {
    var div = document.createElement("div"); div.className = "wround";
    var h = document.createElement("div"); h.className = "wround-name"; h.textContent = t("watch.round_third"); div.appendChild(h);
    if (tr.third) div.appendChild(makeMatchRow(tr.third));
    else if (tr.thirdId != null) { var row = document.createElement("div"); row.className = "wmatch"; var s = document.createElement("span"); s.className = "wname wwin"; s.textContent = t("watch.auto_third", {name: entrantName(tr.thirdId)}); row.appendChild(s); div.appendChild(row); }
    return div;
  }
  function renderTournamentBoard() {
    var board = $("watch-board"); board.innerHTML = "";
    var tr = watch.tourney, bracket = tr.bracket;
    $("watch-sub").textContent = watchSubText();
    for (var r = 0; r < bracket.rounds.length; r++) {
      board.appendChild(makeRoundBlock(bracket, r));
      if (r === bracket.rounds.length - 2 && (tr.third || tr.thirdId != null)) board.appendChild(makeThirdBlock(tr));   // 準決勝の後に3位決定戦
    }
  }
  function renderLeagueBoard() {
    var board = $("watch-board"); board.innerHTML = "";
    var lg = watch.league;
    $("watch-sub").textContent = watchSubText();
    var head = document.createElement("div"); head.className = "wround-name"; head.textContent = t("watch.standings"); board.appendChild(head);
    var ids = lg.ids.slice();
    ids.sort(function (x, y) { var wx = lg.wins[x] || 0, wy = lg.wins[y] || 0; if (wy !== wx) return wy - wx; return x - y; });
    for (var i = 0; i < ids.length; i++) {
      var row = document.createElement("div"); row.className = "wstand";
      var nm = document.createElement("span"); nm.className = "wname"; nm.textContent = entrantName(ids[i]); row.appendChild(nm);
      var w = document.createElement("span"); w.className = "wwins"; w.textContent = t("watch.wins", {n: (lg.wins[ids[i]] || 0)}); row.appendChild(w);

  }

  /* --- スピードバー（観戦中だけ表示。通常プレイでは絶対に出さない） --- */
  function speedLabel(v) { return v === 0.125 ? "⅛" : v === 0.25 ? "¼" : v === 0.5 ? "½" : (v + "×"); }
  function renderSpeedbar() {
    var sb = $("speedbar"); if (!sb) return;
    sb.innerHTML = "";
    var lab = document.createElement("span"); lab.className = "spdlabel"; lab.textContent = t("watch.speed"); sb.appendChild(lab);
    for (var i = 0; i < WATCH_SPEEDS.length; i++) {
      (function (v) {
        var b = document.createElement("button"); b.className = "spdbtn" + (v === BSPEED ? " on" : ""); b.textContent = speedLabel(v);
        b.onclick = function () { sfx.select(); settings.watchSpeed = v; saveSettings(); BSPEED = v; renderSpeedbar(); };
        sb.appendChild(b);
      })(WATCH_SPEEDS[i]);
    }
  }
  function watchShowSpeedbar() { var sb = $("speedbar"); if (sb) sb.style.display = "flex"; }
  function watchHideSpeedbar() { var sb = $("speedbar"); if (sb) sb.style.display = "none"; }
  function watchCleanup() {
    watch = null; watchEntrants = []; BSPEED = 1; watchHideSpeedbar();
    watchAdvanceToken++;   // 保留中の進行タイマーを無効化
    if (battle && !battle.over) { battle.over = true; battle.busy = true; }   // 観戦中バトルを安全に終息（既存の over ガードで進行が止まる）
  }
  function showWatchVictory(subText) {
    var againType = watch ? watch.type : "tournament";
    watchHideSpeedbar();
    var rw = $("resultwin"), rs = $("resultsub");
    rw.textContent = "CONGRATULATIONS!"; rw.style.color = "#ffd24a";
    rs.textContent = subText;
    $("restartbtn").textContent = t("watch.rematch");
    $("restartbtn").onclick = function () { $("resultoverlay").style.display = "none"; if (againType === "tournament") startTournament(); else startLeague(); };
    $("totitlebtn").style.display = "block"; $("totitlebtn").textContent = t("result.to_title");
    $("totitlebtn").onclick = function () { $("resultoverlay").style.display = "none"; watchCleanup(); stopBGM(); showScreen("title"); };
    sfx.grandFanfare();
    $("resultoverlay").style.display = "flex";
    startResultFx("grand");
    setTimeout(function () { if ($("resultoverlay").style.display === "flex") startWinBGM(); }, 5600);   // 長いファンファーレの後にBGM開始（BSPEEDで割らない）
  }

  /* ---------------- HUD / ログ ---------------- */
  function updateHud() {
    for (var i = 0; i < 2; i++) {
      var f = battle.fighters[i], pct = Math.max(0, f.hp) / f.maxHp * 100, fill = $("hpfill" + i);
      fill.style.width = pct + "%";
      fill.style.background = pct > 50 ? "#46d369" : (pct > 20 ? "#ffd24a" : "#ff5a6a");
      $("hpnum" + i).textContent = Math.max(0, f.hp) + " / " + f.maxHp;
      var fs = $("fstat" + i); fs.innerHTML = "";
      addStatSeg(fs, t("stat.atk"), effAtk(f), f.final.atk);
      addStatSeg(fs, t("stat.def"), effDef(f), f.final.def);
      addStatSeg(fs, t("stat.spd"), effSpd(f), f.final.spd);
      $("stat" + i).textContent = statusText(f);
    }
  }
  // HUDのステータス1項目。実効値>基準(final)なら緑で着色（魔法/パッシブで上昇中）、等しければ通常色に即時で戻る。
  function addStatSeg(container, label, eff, base) {
    var seg = document.createElement("span"); seg.className = "fseg" + (eff > base ? " up" : "");
    var i = document.createElement("i"); i.textContent = label;
    var b = document.createElement("b"); b.textContent = eff;
    seg.appendChild(i); seg.appendChild(b); container.appendChild(seg);
  }
  function statusText(f) {
    var s = [];
    if (f.poison) for (var pq = 0; pq < (f.poison.stacks || 1); pq++) s.push(t("hud.psn"));   // 最大2つ
    if (f.bind) s.push(t("hud.bnd"));
    if (f.buffs.barrier) for (var bq = 0; bq < (f.buffs.barrier.stacks || 1); bq++) s.push(t("hud.rfl"));   // 最大2つ
    if (f.buffs.speedup) s.push(t("hud.spd_up"));
    if (f.buffs.allup) s.push(t("hud.pwr_up"));
    if (f.regen > 0) s.push(t("hud.regen"));
    if (f.endure > 0) s.push(t("hud.end"));
    return s.join("  ");
  }
  var logLines = [];
  function pushLogClear() { logLines = []; renderLog(); }
  function pushLog(m) { logLines.push(m); if (logLines.length > 4) logLines.shift(); renderLog(); }
  function renderLog() { $("battlelog").textContent = logLines.join("\n"); }

  /* ---------------- Canvas 描画 + エフェクト ---------------- */
  function drawScene() {
    bctx.setTransform(1, 0, 0, 1, 0, 0); bctx.clearRect(0, 0, BW, BH);
    var sx = 0, sy = 0;
    if (battle && battle.shake > 0) { sx = (Math.random() * 2 - 1) * battle.shake; sy = (Math.random() * 2 - 1) * battle.shake; }
    bctx.save(); bctx.translate(sx, sy);
    bctx.fillStyle = "#0b0f1a"; bctx.fillRect(-14, -14, BW + 28, BH + 28);
    for (var g = 0; g < 18; g++) { bctx.fillStyle = "rgba(120,160,255,0.10)"; bctx.fillRect((g * 53) % BW, (g * 31) % 150, 2, 2); }
    bctx.fillStyle = "#141d30"; bctx.fillRect(-14, 158, BW + 28, 70);
    if (battle) { drawSprite(battle.fighters[0]); drawSprite(battle.fighters[1]); }
    bctx.restore();
    if (battle && battle.flash > 0) { bctx.fillStyle = "rgba(255,255,255," + battle.flash + ")"; bctx.fillRect(0, 0, BW, BH); }
  }
  function drawSprite(f) {
    if (!f.pixels) return;
    var s = SCALE, half = 16 * s / 2;
    var cx = POS[f.index].x + (f.ox || 0), cy = POS[f.index].y + (f.oy || 0), mirror = (f.index === 1);
    bctx.save(); bctx.globalAlpha = f.alpha;
    bctx.translate(cx, cy); if (f.rot) bctx.rotate(f.rot); if (mirror) bctx.scale(-1, 1);
    for (var y = 0; y < 16; y++) for (var x = 0; x < 16; x++) {
      var p = f.pixels[y * 16 + x]; bctx.fillStyle = "rgb(" + p[0] + "," + p[1] + "," + p[2] + ")";
      bctx.fillRect(-half + x * s, -half + y * s, s, s);
    }
    if (f.hitFlash > 0) { bctx.globalAlpha = f.alpha * f.hitFlash * 0.85; bctx.fillStyle = "#fff"; bctx.fillRect(-half, -half, 16 * s, 16 * s); }
    bctx.restore();
  }
  function drawText(x, y, text, color, alpha, size) {
    if (text == null) return;
    bctx.save(); bctx.globalAlpha = alpha; bctx.fillStyle = color; bctx.strokeStyle = "#000"; bctx.lineWidth = 4;
    bctx.font = "bold " + (size || 20) + "px monospace"; bctx.textAlign = "center";
    bctx.strokeText(text, x, y); bctx.fillText(text, x, y); bctx.restore();
  }
  // ---- エフェクト基盤（軽量・画像なし） ----
  function runFX(dur, draw, done) {
    dur = dur / BSPEED;   // 観戦倍速：全アニメの尺を一括で縮める（通常プレイは BSPEED=1 で不変）
    if (!settings.effects) { drawScene(); if (done) setTimeout(done, 90 / BSPEED); return; }
    var start = performance.now();
    (function frame(now) {
      var t = (now - start) / dur; if (t > 1) t = 1;
      draw(t);
      if (t < 1) requestAnimationFrame(frame);
      else { battle.shake = 0; battle.flash = 0; resetFX(); drawScene(); if (done) done(); }

        else if (nm === "ダーク") { pR(tp.x, tp.y, 50 * (1 - bt) + 6, 3, col, 1 - bt); for (var k = 0; k < 10; k++) { var a = k / 10 * Math.PI * 2, rr = (1 - bt) * 40; pC(tp.x + Math.cos(a) * rr, tp.y + Math.sin(a) * rr, 3, col, bt < 0.5 ? bt * 2 : 2 - bt * 2); } }
        else if (nm === "ライト") { for (var k = 0; k < 12; k++) { var a = k / 12 * Math.PI * 2; pL(tp.x, tp.y, tp.x + Math.cos(a) * (20 + bt * 44), tp.y + Math.sin(a) * (20 + bt * 44), 2, k % 2 ? "#fff" : col, 1 - bt); } pC(tp.x, tp.y, 28 * (1 - bt), "#fff", (1 - bt) * 0.7); }
        else if (nm === "サン・ファイア") { battle.flash = 0.5 * (1 - bt); pC(tp.x, tp.y, 42 * (1 - bt) + 10, col, (1 - bt) * 0.65); pC(tp.x, tp.y, 26 * (1 - bt), "#ffe23c", (1 - bt) * 0.8); for (var fp = 0; fp < 8; fp++) { var fw = (9 - fp) * (1 - bt); pC(tp.x + (Math.random() * 2 - 1) * (fw + 2), tp.y - fp * 13 - bt * 26, Math.max(2, fw), fp < 2 ? "#fff" : (fp < 5 ? "#ffd24a" : col), (1 - bt) * 0.9); } pR(tp.x, tp.y, 12 + bt * 46, 3, col, (1 - bt) * 0.8); }
        else { for (var k = 0; k < 12; k++) { var a = k / 12 * Math.PI * 2, rr = bt * 36; pC(tp.x + Math.cos(a) * rr, tp.y + Math.sin(a) * rr - (nm === "ファイア" ? bt * 14 : 0), 4 - bt * 2, col, 1 - bt); } pR(tp.x, tp.y, 10 + bt * 40, 3, col, (1 - bt) * 0.8); }
        if (pierce && !reflected) {   // ★貫通の砕け（反射時は壁で表示済みなのでここでは出さない）
          var brot = bt * 1.6;
          for (var bkk = 0; bkk < 6; bkk++) {
            var bang = brot + bkk / 6 * Math.PI * 2, brr = 22 + bt * 56;
            pL(tp.x + Math.cos(bang) * brr, tp.y + Math.sin(bang) * brr, tp.x + Math.cos(bang + 1.05) * brr, tp.y + Math.sin(bang + 1.05) * brr, Math.max(1, 4 * (1 - bt)), "#7df0ff", 1 - bt);
            pC(tp.x + Math.cos(bang) * (22 + bt * 72), tp.y + Math.sin(bang) * (22 + bt * 72), Math.max(1, 3 * (1 - bt)), "#cffaff", 1 - bt);
          }
          pR(tp.x, tp.y, 18 + bt * 30, Math.max(1, 3 * (1 - bt)), "#4af0d6", (1 - bt) * 0.9);
        }
        dmgPop(tp.x, tp.y, 0.5 + bt * 0.5, dmg, false);
      }
      bctx.restore();
    }, done);
  }
  function playFade(idx, done) {
    var f = battle.fighters[idx], tp = POS[idx], downLbl = t("fx.down");
    if (!settings.effects) { f.alpha = 0; drawScene(); drawText(tp.x, tp.y - 46, downLbl, "#ff5a6a", 1, 18); if (done) setTimeout(done, 300 / BSPEED); return; }
    var dur = 1050 / BSPEED, start = performance.now();
    (function frame(now) {
      var t = (now - start) / dur; if (t > 1) t = 1;
      f.alpha = 1 - t; drawScene();
      drawText(tp.x, tp.y - 46, downLbl, "#ff5a6a", Math.min(1, t * 1.4), 18);
      if (t < 1) requestAnimationFrame(frame); else if (done) done();
    })(start);
  }
  // === 結果オーバーレイ上の演出（勝利テキストの後ろで紙吹雪＆花火）===
  var resultFxRAF = null;
  function stopResultFx() {
    if (resultFxRAF) { cancelAnimationFrame(resultFxRAF); resultFxRAF = null; }
    var c = $("resultfx"); if (c) c.getContext("2d").clearRect(0, 0, c.width, c.height);
  }
  function startResultFx(level) {   // 'grand'(全面クリア) | 'win' | 'lose'
    stopResultFx();
    var cv = $("resultfx"), ov = $("resultoverlay"); if (!cv || !ov) return;
    var W = cv.width = ov.clientWidth || 360, H = cv.height = ov.clientHeight || 640, ctx = cv.getContext("2d");
    var WIN = (level !== "lose"), grand = (level === "grand"), eco = !settings.effects;
    var COLS = WIN ? ["#ff5a6a", "#ffd24a", "#7cff9c", "#5ad6ff", "#c07bff", "#ff9a5a", "#ffffff"] : ["#5a6a86", "#7e93b5", "#48506a"];
    var conf = [], fw = [], start = performance.now(), last = start, nextFw = start + 200;
    var cn = WIN ? (eco ? 26 : (grand ? 130 : 80)) : (eco ? 12 : 26);
    for (var i = 0; i < cn; i++) conf.push({ x: Math.random() * W, y: -Math.random() * H, vx: (Math.random() * 2 - 1) * (WIN ? 40 : 10), vy: (WIN ? 60 : 24) + Math.random() * (WIN ? 90 : 30), col: COLS[i % COLS.length], sz: (WIN ? 4 : 3) + Math.random() * 4 });
    function loop(now) {
      var dt = Math.min(0.05, (now - last) / 1000); last = now;
      ctx.clearRect(0, 0, W, H);
      for (var c = 0; c < conf.length; c++) {
        var p = conf[c]; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (WIN ? 70 : 20) * dt;
        if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; p.vy = (WIN ? 60 : 24) + Math.random() * (WIN ? 90 : 30); }
        ctx.globalAlpha = WIN ? 0.95 : 0.5; ctx.fillStyle = p.col; ctx.fillRect(p.x, p.y, p.sz, p.sz * 1.7);
      }
      if (WIN && !eco && now >= nextFw) { nextFw = now + 90 + Math.random() * (grand ? 620 : 950); fw.push({ x: W * (0.12 + Math.random() * 0.76), y: H * (0.08 + Math.random() * 0.32), age: 0, col: COLS[Math.floor(Math.random() * COLS.length)] }); sfx.pop(); }   // 打ち上げ間隔は完全ランダム
      for (var fI = fw.length - 1; fI >= 0; fI--) {
        var b = fw[fI]; b.age += dt; var ft = b.age; if (ft >= 1) { fw.splice(fI, 1); continue; }
        var n = grand ? 22 : 16; for (var k = 0; k < n; k++) { var a = k / n * Math.PI * 2, r = ft * W * 0.18; ctx.globalAlpha = 1 - ft; ctx.fillStyle = b.col; ctx.beginPath(); ctx.arc(b.x + Math.cos(a) * r, b.y + Math.sin(a) * r + ft * ft * 30, Math.max(0.4, 3.4 * (1 - ft)), 0, Math.PI * 2); ctx.fill(); }
      }
      ctx.globalAlpha = 1;
      resultFxRAF = requestAnimationFrame(loop);
    }
    resultFxRAF = requestAnimationFrame(loop);
  }
  function playSelfFX(skill, idx, label, done) {
    var p = POS[idx], col = skill.color || "#ffffff", sp = skill.special;
    return runFX(680, function (t) {
      drawScene(); bctx.save();
      if (sp === "barrier") {                                   // 六角の反射バリア
        var rot = t * Math.PI;
        for (var k = 0; k < 6; k++) { var a1 = rot + k / 6 * Math.PI * 2, a2 = rot + (k + 1) / 6 * Math.PI * 2; pL(p.x + Math.cos(a1) * 40, p.y + Math.sin(a1) * 40, p.x + Math.cos(a2) * 40, p.y + Math.sin(a2) * 40, 3, col, (1 - t) * 0.9); }
        pR(p.x, p.y, 40, 2, col, (1 - t) * 0.5);
      } else if (sp === "heal") {                               // 緑の十字きらめきが上昇
        pR(p.x, p.y, 14 + t * 32, 3, col, 1 - t);
        for (var k = 0; k < 7; k++) { var x = p.x - 38 + k * 12, y = p.y + 44 - t * 96; pL(x - 4, y, x + 4, y, 3, col, 1 - t); pL(x, y - 4, x, y + 4, 3, col, 1 - t); }
      } else if (sp === "speedup") {                            // 流れる速度線
        for (var k = 0; k < 6; k++) { var y = p.y - 40 + k * 16, off = (t * 130 + k * 22) % 86; pL(p.x - 46 + off, y, p.x - 22 + off, y, 3, col, (1 - t) * 0.9); }
        pR(p.x, p.y, 18 + t * 30, 2, col, 1 - t);
      } else {                                                  // スペシャル: 虹色オーラ
        var cols = ["#ff5a6a", "#ffd24a", "#7cff9c", "#5ad6ff", "#c07bff"];
        for (var k = 0; k < 10; k++) { var a = k / 10 * Math.PI * 2 + t * 4, rr = (1 - t) * 10 + t * 52; pC(p.x + Math.cos(a) * rr, p.y + Math.sin(a) * rr, 3, cols[k % 5], 1 - t); }
        pR(p.x, p.y, 18 + t * 40, 3, "#ffd24a", 1 - t);
      }
      bctx.restore();
      drawText(p.x, p.y - 54 - t * 16, label, col, 1 - t, 16);
    }, done);
  }
  function playMiss(targetIdx, done) {
    var tp = POS[targetIdx];
    runFX(360, function (t) { drawScene(); drawText(tp.x, tp.y - 50, "MISS", "#9fb3c8", 1 - t, 18); }, done);
  }

  /* ---------------- i18n（静的テキスト） ---------------- */
  function renderI18n() {
    $("langbtn").textContent = "🌐 " + langName(LANG);
    $("subtitle").innerHTML = t("title.subtitle");
    $("b1").textContent = t("title.badge1");
    $("b2").textContent = t("title.badge2");
    $("b3").textContent = t("title.badge3");
    setModeBtn("mode-solo", "🗡 ", t("mode.solo"), t("mode.solo_desc"));
    setModeBtn("mode-hotseat", "🤝 ", t("mode.hotseat"), t("mode.hotseat_desc"));
    setModeBtn("mode-qr", "📱 ", t("mode.qr"), t("mode.qr_desc"));
    setModeBtn("mode-mychar", "🎴 ", t("mode.mychar"), t("mode.mychar_desc"));
    $("soyogilink").textContent = "🌿 " + t("title.soyogi");
    updateSoloBadges();
    $("set-title").textContent = t("settings.title");
    $("set-lang-label").textContent = t("settings.lang_label");
    $("set-sound-label").textContent = t("settings.sound_label");
    $("set-effects-label").textContent = t("settings.effects_label");
    $("set-vibrate-label").textContent = t("settings.vibrate_label");
    $("set-data-label").textContent = t("settings.data_label");
    $("bk-export-btn").textContent = t("settings.backup_btn");
    $("bk-import-btn").textContent = t("settings.restore_btn");
    $("bk-copy").textContent = t("common.copy");
    $("bk-restore").textContent = t("backup.restore_do");
    $("bk-close").textContent = t("common.close");
    $("bk-hint").textContent = t("backup.iphone_hint");
    $("set-close").textContent = t("common.close");
    $("setlangbtn").textContent = "🌐 " + langName(LANG);
    $("lang-title").textContent = t("settings.lang_label");
    $("lang-close").textContent = t("common.close");
    $("vol-slider").value = settings.vol;
    $("vol-val").textContent = settings.vol <= 0 ? t("settings.mute") : ("×" + settings.vol.toFixed(1));
    $("toggle-effects").textContent = settings.effects ? t("settings.on") : t("settings.off");
    $("toggle-effects").classList.toggle("off", !settings.effects);
    $("toggle-vibrate").textContent = settings.vibrate ? t("settings.on") : t("settings.off");
    $("toggle-vibrate").classList.toggle("off", !settings.vibrate);
    $("gearbtn").setAttribute("aria-label", t("settings.title"));
    $("surrenderbtn").textContent = "🏳 " + t("battle.surrender");
    $("confirm-no").textContent = t("confirm.cancel");
    $("confirm-yes").textContent = t("confirm.yes");
    if (currentScreen === "setup") setSetupTexts();
    else if (currentScreen === "saved") openSaved();
    else if (currentScreen === "difficulty") openDifficulty();
    else if (currentScreen === "qrhub") openQRHub();
    else if (currentScreen === "qrshow") openQRShow();
    else if (currentScreen === "qrscan") openQRScan();
    else if (currentScreen === "watch") renderWatchScreen();
    if (currentScreen === "battle" && battle) { updateStageInfo(); if (!battle.busy && !battle.over && battle.active != null && !battle.fighters[battle.active].isAI) showCommands(battle.active); updateHud(); }
    if (watch) renderSpeedbar();   // 観戦中はスピードバーのラベルも言語追従
  }
  function setModeBtn(id, icon, title, desc) {
    var b = $(id); b.innerHTML = "";
    var t = document.createElement("span"); t.className = "mtitle"; t.textContent = icon + title;
    var d = document.createElement("span"); d.className = "mdesc"; d.textContent = desc;
    b.appendChild(t); b.appendChild(d);
  }
  function setLang(lang) { LANG = lang; settings.lang = lang; saveSettings(); $("langoverlay").style.display = "none"; renderI18n(); }
  // 言語ピッカー：availableLangs()（I18Nに存在する言語）だけをボタンで並べる。12言語注入で自動的に増える
  function openLangPicker() {
    var box = $("langlist"); box.innerHTML = "";
    var langs = availableLangs();
    for (var i = 0; i < langs.length; i++) {
      (function (code, name) {
        var b = document.createElement("button");
        b.className = "langitem" + (code === LANG ? " on" : "");
        b.textContent = name;
        b.onclick = function () { sfx.select(); setLang(code); };
        box.appendChild(b);
      })(langs[i].code, langs[i].name);
    }
    $("langoverlay").style.display = "flex";
  }

  /* ---------------- 初期化 ---------------- */
  function init() {
    bcv = $("battlecanvas"); bctx = bcv.getContext("2d"); bctx.imageSmoothingEnabled = false;

    // 言語選択（🌐→リスト。I18Nに存在する言語だけ表示＝12言語注入で自動的に増える）
    $("langbtn").onclick = function () { sfx.select(); openLangPicker(); };
    $("setlangbtn").onclick = function () { sfx.select(); openLangPicker(); };
    $("lang-close").onclick = function () { $("langoverlay").style.display = "none"; };
    // 設定
    $("gearbtn").onclick = function () { sfx.select(); renderI18n(); $("settingsoverlay").style.display = "flex"; };
    $("set-close").onclick = function () { $("settingsoverlay").style.display = "none"; };
    $("vol-slider").oninput = function () {
      var prev = settings.vol;
      settings.vol = Math.max(0, Math.min(3, parseFloat(this.value) || 0)); saveSettings();
      $("vol-val").textContent = settings.vol <= 0 ? t("settings.mute") : ("×" + settings.vol.toFixed(1));
      if (settings.vol <= 0 && prev > 0) stopBGM();                 // 0でミュート
      else if (settings.vol > 0 && prev <= 0) resumeBGM();          // 0→音ありで復帰（途中の音量変更は走行中BGMが自動反映）
    };
    $("toggle-effects").onclick = function () { settings.effects = !settings.effects; saveSettings(); renderI18n(); };
    $("toggle-vibrate").onclick = function () {
      settings.vibrate = !settings.vibrate; saveSettings(); renderI18n();
      if (settings.vibrate) { try { if (navigator.vibrate) navigator.vibrate(55); } catch (e) {} }   // ONにした瞬間に試し振動
    };
    // データのバックアップ/復元
    $("bk-export-btn").onclick = function () { sfx.select(); openBackup("export"); };
    $("bk-import-btn").onclick = function () { sfx.select(); openBackup("import"); };
    $("bk-close").onclick = function () { $("backupoverlay").style.display = "none"; };
    $("bk-copy").onclick = function () {
      var ta = $("bk-text"); ta.readOnly = false; ta.focus(); ta.select();
      var ok = false;
      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(ta.value).then(function () {}, function () {}); ok = true; }
      else { try { ok = document.execCommand("copy"); } catch (e) {} }
      ta.readOnly = true; sfx.select();
      $("bk-copy").textContent = ok ? t("common.copied") : t("common.copy");
      setTimeout(function () { $("bk-copy").textContent = t("common.copy"); }, 1500);
    };
    $("bk-restore").onclick = function () {
      var clean = ($("bk-text").value || "").replace(/\s+/g, "");
      if (!clean) { alert(t("backup.paste_code")); return; }
      if (bkMode === "receive") {                                   // 戦士1体を追加（上書きしない）
        var arr = loadSaved();
        if (arr.length >= 9) { alert(t("saved.full2")); return; }
        var d = decodeFighter(clean);
        if (!d || !d.pixels || !d.base) { alert(t("backup.invalid_fighter")); return; }
        arr.push(clean); persistSaved(arr); sfx.select();
        $("backupoverlay").style.display = "none";
        alert(t("backup.fighter_joined", {name: d.name || t("backup.a_fighter")}));
        openSaved();
        return;
      }
      // import = データ全体を復元（上書き＋リロード）
      if (!confirm(t("backup.overwrite_confirm"))) return;
      try {
        applyBackup(clean);
        alert(t("backup.restored"));
        location.reload();
      } catch (e) {
        alert(t("backup.invalid_code"));
      }
    };
    // 保存データが消えにくいよう「永続化」を要求（対応ブラウザのみ・best-effort）
    if (navigator.storage && navigator.storage.persist) {
      try { navigator.storage.persisted().then(function (p) { if (!p) navigator.storage.persist(); }); } catch (e) {}
    }

    // タイトル → モード
    $("mode-solo").onclick = function () { sfx.select(); openDifficulty(); };
    $("mode-hotseat").onclick = function () { sfx.select(); mode = "hotseat"; pending = {}; startSetupFor("p1"); };
    $("mode-qr").onclick = function () { sfx.select(); mode = "qr"; pending = {}; startSetupFor("you"); };
    $("mode-mychar").onclick = function () { sfx.select(); pending = {}; openMyChar(); };
    // 難易度
    $("diff-back").onclick = function () { showScreen("title"); };

    // セットアップ
    $("btncamera").onclick = function () { $("filecamera").click(); };
    $("btnupload").onclick = function () { $("fileupload").click(); };
    $("filecamera").onchange = function (e) { onImageChosen(e.target.files[0]); e.target.value = ""; };
    $("fileupload").onchange = function (e) { onImageChosen(e.target.files[0]); e.target.value = ""; };
    $("retakebtn").onclick = function () {
      setupBuf.pixels = null; $("setupresult").style.display = "none"; $("previewwrap").classList.add("empty"); $("confirmbtn").disabled = true;
      var pc = $("previewcanvas"); pc.getContext("2d").clearRect(0, 0, pc.width, pc.height);
    };
    $("confirmbtn").onclick = function () { sfx.select(); confirmSetup(); };
    $("setup-back").onclick = function () { showScreen("title"); };
    $("btnsaved").onclick = function () { sfx.select(); openSaved(); };
    $("savebtn").onclick = function () { saveCurrentChar(); };
    $("nameinput").oninput = function () { setupBuf.name = (this.value || "").slice(0, (LANG === "en") ? 12 : 8); };
    $("saved-back").onclick = function () { showScreen("setup"); };
    $("saved-receive").onclick = function () { sfx.select(); openBackup("receive"); };

    // QR
    $("qrshowbtn").onclick = function () { sfx.select(); openQRShow(); };
    $("qrscanbtn").onclick = function () { sfx.select(); openQRScan(); };
    $("qr-back").onclick = function () { showScreen("title"); };
    $("qrshow-scan").onclick = function () { sfx.select(); $("qrfile").click(); };
    $("qrshow-fight").onclick = function () { if (pending.rival) { sfx.select(); startBattleQR(); } };
    $("qrshow-back").onclick = function () { showScreen("title"); };
    $("qrscan-open").onclick = function () { $("qrfile").click(); };
    $("qrfile").onchange = function (e) { handleQRPhoto(e.target.files[0]); e.target.value = ""; };
    $("qrscan-back").onclick = function () { openQRHub(); };

    // 観戦モード：やめる（✕→確認）
    $("watch-quit").onclick = function () { sfx.select(); if (confirm(t("watch.quit_confirm"))) { watchCleanup(); openMyChar(); } };

    // リザルト
    $("totitlebtn").onclick = function () { $("resultoverlay").style.display = "none"; stopBGM(); showScreen("title"); };

    // 降参（誤タップ防止に「あなたは まけに なります。いいですか？」で再確認）
    $("surrenderbtn").onclick = function () { sfx.select(); $("confirm-msg").textContent = t("confirm.surrender_msg"); $("confirmoverlay").style.display = "flex"; };
    $("confirm-no").onclick = function () { sfx.select(); $("confirmoverlay").style.display = "none"; };
    $("confirm-yes").onclick = function () { $("confirmoverlay").style.display = "none"; doSurrender(); };

    renderI18n();
    showScreen("title");
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init); else init();
})();
</script>

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("service-worker.js").catch(function () {});
    });
  }
</script>
